{{- /*
  oracle-config.yaml — ConfigMap: tnsnames.ora + startup script

  LAB 2 — Database Link:
  - tnsnames.ora: tự động sinh entries ORACLE_DB_0, ORACLE_DB_1, ...
    cho mỗi replica. Dùng cho:
    • Lab 2 Bài 1: tạo database link (connected/fixed user link)
    • Lab 2 Bài 2: ĐHQG truy vấn ĐH CNTT qua db link
    • Lab 2 Bài 3: chi nhánh ngân hàng kết nối hai chiều
  - 01_update_tns.sh: inject tnsnames.ora vào Oracle home khi startup
    → tự động có thể tnsping ORACLE_DB_0 / ORACLE_DB_1
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: oracle-network-config
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  # tnsnames.ora: mỗi replica = 1 entry (ORACLE_DB_0, ORACLE_DB_1, ...)
  # HOST = headless service DNS: oracle-db-X.oracle-svc.<namespace>.svc.cluster.local
  tnsnames.ora: |
    {{- range $i := until (int .Values.replicas) }}
    ORACLE_DB_{{ $i }} = (DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=oracle-db-{{ $i }}.oracle-svc.{{ $.Release.Namespace }}.svc.cluster.local)(PORT=1521))(CONNECT_DATA=(SERVER=DEDICATED)(SERVICE_NAME={{ $.Values.oracle.sid }})))
    {{- end }}

  # Startup script: chạy khi Oracle container khởi động
  # Inject tnsnames.ora từ ConfigMap vào Oracle home để sqlplus/tnsping hoạt động
  01_update_tns.sh: |
    #!/bin/bash
    TNS_FILE=/opt/oracle/product/19c/dbhome_1/network/admin/tnsnames.ora
    echo "--- Bat dau cap nhat TNSNAMES.ORA tu ConfigMap ---"
    sed -i '/^ORACLE_DB_/d' "$TNS_FILE"
    cat /tmp/custom_tns/tnsnames.ora >> "$TNS_FILE"
    echo "--- Cap nhat thanh cong! ---"
    grep "ORACLE_DB" "$TNS_FILE"
