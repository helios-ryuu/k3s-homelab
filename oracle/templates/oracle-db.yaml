{{- /*
  oracle-db.yaml — Headless Service + NodePort Service + StatefulSet
  replicas={{ .Values.replicas }}
#   Pin vào database nodes, 1 pod/node
#
#   LAB MAPPING:
#   - Headless Service: DNS nội bộ cho cross-instance queries (Lab 2)
#     oracle-db-0.oracle-svc.oracle.svc.cluster.local (Node 1 = ĐHCNTT / Chi nhánh 1)
#     oracle-db-1.oracle-svc.oracle.svc.cluster.local (Node 2 = ĐHQG / Chi nhánh 2)
#   - NodePort 31521: kết nối từ DataGrip/SQL Developer qua Tailscale IP (Lab 1, 2)
#   - hostPort 1521: kết nối trực tiếp qua IP node (Lab 2 Bài 1 database link)
#   - tnsnames.ora (ConfigMap): ORACLE_DB_0, ORACLE_DB_1 → Lab 2 database link
  - Anti-affinity: đảm bảo mỗi pod trên 1 node riêng biệt

  FAULT TOLERANCE:
  - Node offline → pod Pending, pod còn lại vẫn chạy
#   - PVC (local-path) giữ data khi restart
#   - tolerations: cho phép chạy trên master node
*/ -}}

# ==========================================================================
# HEADLESS SERVICE: oracle-svc (DNS nội bộ cho StatefulSet)
# Lab 2: oracle-db-0.oracle-svc ↔ oracle-db-1.oracle-svc (database link)
# ==========================================================================
apiVersion: v1
kind: Service
metadata:
  name: oracle-svc
  labels:
    app: oracle
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  clusterIP: None
  selector:
    app: oracle
  ports:
    - name: db-port
      port: 1521

---
# ==========================================================================
# NODEPORT SERVICE: Kết nối từ bên ngoài (DataGrip, SQL Developer)
# Lab 1 & 2: Truy cập qua <Tailscale-IP>:{{ .Values.nodePort }}
#   Node 1:   <node-1-ip>:{{ .Values.nodePort }}
#   Node 2:   <node-2-ip>:{{ .Values.nodePort }}
# ==========================================================================
apiVersion: v1
kind: Service
metadata:
  name: oracle-nodeport
  labels:
    app: oracle
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: NodePort
  selector:
    app: oracle
  ports:
    - name: db-external
      port: 1521
      targetPort: 1521
      nodePort: {{ .Values.nodePort }}

---
# ==========================================================================
# STATEFULSET: oracle-db
# replicas: {{ .Values.replicas }}
# Lab 2 Bài 2: oracle-db-0 = Node 1, oracle-db-1 = Node 2
# Lab 2 Bài 3: oracle-db-0 = Chi nhánh 1, oracle-db-1 = Chi nhánh 2
# ==========================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: oracle-db
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podManagementPolicy: Parallel
  serviceName: oracle-svc
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: oracle
  template:
    metadata:
      labels:
        app: oracle
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # === LUẬT ĐIỀU PHỐI ===
# Tolerate master node taint (control-plane)
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}
      affinity:
        # CẤM 2 Oracle chung 1 node → mỗi node tối đa 1 pod
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - oracle
            topologyKey: kubernetes.io/hostname

      containers:
      - name: oracle-engine
        image: {{ .Values.oracle.image }}
        imagePullPolicy: Never
        securityContext:
          privileged: true
        env:
        - name: ORACLE_SID
          value: {{ .Values.oracle.sid | quote }}
        - name: ORACLE_PWD
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: oracle-password
        resources:
          requests:
            memory: {{ .Values.oracle.resources.requests.memory }}
            cpu: {{ .Values.oracle.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.oracle.resources.limits.memory }}
            cpu: {{ .Values.oracle.resources.limits.cpu | quote }}
        ports:
        - containerPort: 1521
          # hostPort: kết nối trực tiếp qua IP node (Lab 2 database link)
          hostPort: 1521
        volumeMounts:
        - name: oracle-data
          mountPath: /opt/oracle/oradata
        # tnsnames.ora: cấu hình sẵn ORACLE_DB_0/1 cho Lab 2 database link
        - name: tns-data-volume
          mountPath: /tmp/custom_tns/tnsnames.ora
          subPath: tnsnames.ora
        # Startup script: inject tnsnames.ora vào Oracle home
        - name: tns-script-volume
          mountPath: /opt/oracle/scripts/startup/01_update_tns.sh
          subPath: 01_update_tns.sh

      volumes:
      - name: tns-data-volume
        configMap:
          name: oracle-network-config
      - name: tns-script-volume
        configMap:
          name: oracle-network-config
          defaultMode: 0777

  volumeClaimTemplates:
  - metadata:
      name: oracle-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: {{ .Values.oracle.storage }}
