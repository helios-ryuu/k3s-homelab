# =================================================================
# LocalStack Pro — AWS emulator
# Node: master (ổn định nhất)
# API:  http://<master-ip>:30566
# Từ trong cluster: http://localstack.localstack.svc.cluster.local:4566
# =================================================================
# Pre-deploy checklist:
#   1. localstack-pro image pull từ Docker Hub (pullPolicy: Always)
#   2. DinD (mountDind.enabled=true) → cần securityContext privileged
#   3. Persistence → PVC local-path 5Gi trên master node
#   4. NodePort 30566 cố định (tránh đổi sau redeploy)
#   5. Resources: requests 512Mi/500m, limits 3Gi/2 (DinD overhead)
# =================================================================

# --- IMAGE: LocalStack Pro (Auth Token required) ---
image:
  repository: localstack/localstack-pro
  tag: "latest"
  pullPolicy: Always

# --- DEPLOYMENT STRATEGY ---
# Recreate bắt buộc khi dùng PVC ReadWriteOnce + DinD
updateStrategy:
  type: Recreate

# --- SERVICES (AWS emulation) ---
# Dùng extraEnvVars thay vì startServices để tương thích Pro
extraEnvVars:
  - name: LOCALSTACK_AUTH_TOKEN
    valueFrom:
      secretKeyRef:
        name: infra-secrets
        key: localstack-token
  - name: PERSISTENCE
    value: "1"
  - name: SERVICES
    value: "iam,sts,s3,rds,apigateway,sns,sqs,secretsmanager,cloudwatch,lambda,ec2,route53,backup"
  - name: DOCKER_HOST
    value: "tcp://localhost:2376"

# --- DIND (Docker-in-Docker) ---
# Cần cho Lambda/ECS emulation trong LocalStack Pro
# forceTLS=false để đơn giản hóa kết nối nội bộ pod
mountDind:
  enabled: true
  forceTLS: false
  image: "docker:20.10-dind"

# --- SECURITY CONTEXT ---
# DinD bắt buộc privileged=true (container chạy Docker daemon)
# fsGroup 1000 để LocalStack process đọc được PVC
podSecurityContext:
  fsGroup: 1000

securityContext:
  privileged: true

# --- SERVICE: NodePort cố định 34566 ---
# Pin nodePort để tránh đổi sau redeploy (Cloudflare tunnel ổn định)
service:
  type: NodePort
  edgeService:
    name: edge
    targetPort: 4566
    nodePort: 30566
  externalServicePorts:
    start: 4510
    end: 4560

# --- PERSISTENCE: PVC local-path 5Gi trên master ---
# PERSISTENCE=1 yêu cầu mount /var/lib/localstack
persistence:
  enabled: true
  storageClass: "local-path"
  accessModes:
    - ReadWriteOnce
  size: 5Gi

# --- RESOURCES ---
# DinD chạy thêm Docker daemon → cần buffer thêm ~512Mi/0.5 CPU
# Master node: 8GB RAM, requests đảm bảo scheduler đặt đúng
resources:
  requests:
    memory: 512Mi
    cpu: 500m
  limits:
    memory: 3Gi
    cpu: "2"

# --- NODE PLACEMENT ---
# Sử dụng label thay vì ghi cứng tên node
nodeSelector:
  node-role.kubernetes.io/localstack: "true"

# Tolerate control-plane taint (master node)
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
