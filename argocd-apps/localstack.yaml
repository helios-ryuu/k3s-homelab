apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: localstack
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://helm.localstack.cloud
      chart: localstack
      targetRevision: "0.x"
      helm:
        valueFiles:
          - $values/services/localstack/values.yaml
    - repoURL: git@github.com:helios-ryuu/k3s-homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: localstack
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true
