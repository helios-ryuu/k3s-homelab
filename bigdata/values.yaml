# =================================================================
# values.yaml — Cấu hình Hadoop + Spark trên K3s
# =================================================================
#
# ┌─────────────────────────────────────────────────────────────────┐
# │  TOPOLOGY (cụm phân tán thực — Bài TH số 1, mục III.1.d)      │
# │                                                                 │
# │  Management node (master):                                        │
# │    ├── NameNode          (HDFS master — lưu metadata)           │
# │    ├── ResourceManager   (YARN master — quản lý tài nguyên)    │
# │    └── Spark Master      (điều phối Spark jobs)                 │
# │                                                                 │
# │  Worker nodes (distributed):                                    │
# │    ├── DataNode          (HDFS — lưu block dữ liệu)            │
# │    ├── NodeManager       (YARN — thực thi MapReduce tasks)     │
# │    └── Spark Worker      (thực thi Spark tasks)                 │
# │                                                                 │
# │  Nếu 1 worker offline → 1 pod Pending (bình thường)            │
# │  Nếu cả 2 worker offline → tất cả worker pods Pending          │
# │  Management pods luôn chạy trên master node (ổn định)          │
# └─────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────┐
# │  BÀI THỰC HÀNH ↔ THÀNH PHẦN                                    │
# │                                                                 │
# │  Lab 1: Cài đặt Hadoop + Spark phân tán                        │
# │    → Toàn bộ chart (NameNode, DataNode, RM, NM, Spark M/W)     │
# │                                                                 │
# │  Lab 2: Thao tác HDFS + MapReduce Java (WordCount, retail.dat) │
# │    → NameNode (WebUI :9870) + DataNode (HDFS storage)           │
# │    → ResourceManager (YARN :8088) + NodeManager                 │
# │    → mapred-site.xml: mapreduce.framework.name = yarn           │
# │                                                                 │
# │  Lab 3: PySpark + RDD (trung bình, phương sai, phân số)        │
# │    → Spark Master + Worker (PySpark shell / spark-submit)       │
# │    → spark-env.sh: PYSPARK_PYTHON = python3                    │
# │                                                                 │
# │  Lab 4: Spark DataFrame + Spark SQL (JSON, CSV, ebay)          │
# │    → Spark 3.5.8 có sẵn DataFrame/SQL API                      │
# │                                                                 │
# │  Lab 5: MLlib (LinearRegression, RegressionEvaluator)          │
# │    → Spark 3.5.8 có sẵn thư viện MLlib                         │
# │                                                                 │
# │  Lab 7: GraphFrames (PageRank, BFS, Connected Components)      │
# │    → spark-defaults.conf: spark.jars.packages = graphframes     │
# │    → Tự động tải khi chạy pyspark hoặc spark-submit            │
# └─────────────────────────────────────────────────────────────────┘
#
# Scale workers:
#   bash ./mng.sh scale bigdata 2   # Khôi phục masters + 2 workers
#   bash ./mng.sh scale bigdata 0   # Tắt toàn bộ (masters + workers)
#   Scale 0 tắt luôn NameNode/RM/SparkMaster để tránh crash restart loop
#
# Truy cập:
#   HDFS WebUI:            http://<master-ip>:9870
#   YARN ResourceManager:  http://<master-ip>:8088
#   Spark Master WebUI:    http://<any-node-ip>:30808  (NodePort)
#   Spark Worker WebUI:    http://<worker-ip>:8081
#
# Chạy homework:
#   kubectl exec -it -n bigdata deploy/spark-master -- /opt/spark/bin/pyspark
#   kubectl exec -it -n bigdata deploy/spark-master -- /opt/spark/bin/spark-submit /tmp/baitap.py
# =================================================================

# --- SỐ LƯỢNG WORKER (DataNode + NodeManager + SparkWorker mỗi node) ---
# Mặc định 2 = 2 worker nodes
# Mỗi StatefulSet (DataNode, NodeManager, SparkWorker) sẽ tạo đúng N pod
# podAntiAffinity đảm bảo KHÔNG có 2 pod cùng loại chung 1 node
workers:
  replicas: 2

# --- NODE CHẠY MANAGEMENT PODS ---
management:
  nodeSelector:
    node-role.kubernetes.io/bigdata-master: "true"

# --- DANH SÁCH WORKER NODES ---
worker:
  nodeSelector:
    node-role.kubernetes.io/bigdata-worker: "true"

# =================================================================
# HADOOP 3.2.1 (image bde2020 — đã cấu hình sẵn entrypoint)
# =================================================================
# Image bde2020 tự động:
#   - Đọc biến CORE_CONF_*, HDFS_CONF_*, YARN_CONF_*, MAPRED_CONF_*
#   - Ghi vào core-site.xml, hdfs-site.xml, yarn-site.xml, mapred-site.xml
#   - NameNode tự format lần đầu nếu chưa có dữ liệu
# =================================================================
hadoop:
  # Tên cluster (hiển thị trên WebUI NameNode)
  clusterName: k3s-hadoop-cluster

  # --- NAMENODE (Lab 1 + Lab 2: HDFS master, lưu metadata filesystem) ---
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    storage: 10Gi # PVC cho /hadoop/dfs/name (metadata)
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: "1"

  # --- DATANODE (Lab 1 + Lab 2: HDFS worker, lưu block dữ liệu) ---
  # Mỗi DataNode chạy trên 1 worker node riêng (podAntiAffinity)
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    storage: 20Gi # PVC cho /hadoop/dfs/data (data blocks)
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: "1"

  # --- RESOURCEMANAGER (Lab 2: YARN master, quản lý tài nguyên cụm) ---
  # WebUI: http://<master-ip>:8088 — xem trạng thái MapReduce jobs
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: "1"

  # --- NODEMANAGER (Lab 2: YARN worker, thực thi MapReduce containers) ---
  # memory + vcores = tài nguyên mỗi NodeManager cấp cho YARN
  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    memory: 4096 # yarn.nodemanager.resource.memory-mb
    vcores: 2 # yarn.nodemanager.resource.cpu-vcores
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: "1"

  # Đường dẫn gốc Hadoop trong image bde2020
  home: /opt/hadoop-3.2.1

# =================================================================
# SPARK 3.5.8 (image chính thức Apache — có sẵn PySpark + MLlib)
# =================================================================
# Chọn Spark 3.5.8 (không dùng 4.x) vì:
#   - Bài TH viết cho Spark 3.x, mọi API (RDD, DataFrame, SQL, MLlib) tương thích
#   - GraphFrames 0.8.4 chỉ có bản cho Spark 3.5 + Scala 2.12
#   - Image 3.5.8-python3 = Scala 2.12 + Java 17 + Python 3
# =================================================================
spark:
  # --- SPARK MASTER (Lab 1: điều phối Spark jobs) ---
  # WebUI qua NodePort 30808 (tránh xung đột hostPort 8080)
  master:
    image: apache/spark:3.5.8-python3
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: "1"

  # --- SPARK WORKER (Lab 1 + Lab 3-7: thực thi Spark tasks) ---
  # cores + memory = tài nguyên mỗi Worker đăng ký với Master
  worker:
    image: apache/spark:3.5.8-python3
    cores: 2 # Số core mỗi worker
    memory: 2G # RAM mỗi worker
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: "1"

  # --- GRAPHFRAMES (Lab 7: xử lý đồ thị — PageRank, BFS, v.v.) ---
  # Package tự động tải qua spark.jars.packages khi chạy pyspark/spark-submit
  # Format: groupId:artifactId:version
  # Spark 3.5.8-python3 dùng Scala 2.12 → phải dùng s_2.12
  graphframes:
    package: "graphframes:graphframes:0.8.4-spark3.5-s_2.12"
