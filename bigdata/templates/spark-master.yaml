{{- /*
  spark-master.yaml — Spark Master: Service (NodePort) + Deployment
  ─────────────────────────────────────────────────────────────────
  Vai trò: Điều phối toàn bộ Spark jobs trong cụm
#   Chạy trên: management node (master)
  ─────────────────────────────────────────────────────────────────
  Lab 1:  Cài đặt framework Apache Spark (phần Spark Master)
  Lab 3+: Spark Master nhận jobs từ pyspark / spark-submit
  ─────────────────────────────────────────────────────────────────
  Truy cập WebUI: http://<any-node-ip>:30808
  RPC endpoint:   spark://spark-master:7077 (nội bộ cluster)
  ─────────────────────────────────────────────────────────────────
  Lý do dùng NodePort thay vì hostPort:
    - hostPort 8080 dễ xung đột với Traefik, YARN RM, v.v.
    - NodePort 30808 truy cập được từ BẤT KỲ node nào trong cụm
*/ -}}

# ==========================================================================
# SERVICE: spark-master (NodePort — WebUI port 30808)
# ClusterIP port 7077 = Spark RPC (worker đăng ký, job submission)
# NodePort 30808 = WebUI (xem danh sách workers, running jobs, v.v.)
# ==========================================================================
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: NodePort
  ports:
    # --- RPC: worker kết nối đến master, spark-submit gửi job ---
    - port: 7077
      targetPort: 7077
      name: spark-rpc
    # --- WebUI: giao diện quản lý Spark (NodePort 30808) ---
    - port: 8080
      targetPort: 8080
      nodePort: 30808
      name: spark-webui
  selector:
    app: spark-master

---
# ==========================================================================
# DEPLOYMENT: spark-master → management node
# ──────────────────────────────────────────────────────────────────────────
# - enableServiceLinks: false → tránh biến PORT bị K8s ghi đè
#   (Spark đọc biến PORT để bind, nếu K8s inject PORT=tcp://... → crash)
# - nodeSelector → chạy cố định trên management node
# - Volume mount: Hadoop config (core-site, hdfs-site) + Spark config
#   để Spark Master biết HDFS NameNode và cấu hình mặc định
# ==========================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate                    # Không cần rolling — chỉ 1 replica
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # Tắt service links → ngăn K8s inject biến PORT (gây lỗi Spark)
      enableServiceLinks: false

      {{- if .Values.management.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.management.nodeSelector | indent 8 }}
      {{- end }}

      containers:
        - name: spark-master
          image: {{ .Values.spark.master.image }}
          # Khởi chạy Spark Master process
          # --host 0.0.0.0 = lắng nghe mọi interface
          # --port 7077    = RPC port cho workers và spark-submit
          # --webui-port 8080 = WebUI nội bộ (expose qua NodePort 30808)
          command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
          args: ["--host", "0.0.0.0", "--port", "7077", "--webui-port", "8080"]
          env:
            # Pod IP để Spark bind đúng network interface
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # QUAN TRỌNG: Spark Master quảng bá hostname cho executors
            # Nếu không set → dùng pod hostname (vd: spark-master-787c645988-n7w7f)
            # Executor trên node khác KHÔNG resolve được pod hostname → crash
            # Set = Pod IP → executors kết nối bằng IP (luôn hoạt động cross-node)
            - name: SPARK_LOCAL_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 7077
              name: spark-rpc
            - containerPort: 8080
              name: spark-webui
          resources:
            requests:
              memory: {{ .Values.spark.master.resources.requests.memory }}
              cpu: {{ .Values.spark.master.resources.requests.cpu }}
            limits:
              memory: {{ .Values.spark.master.resources.limits.memory }}
              cpu: {{ .Values.spark.master.resources.limits.cpu }}
          volumeMounts:
            # --- Hadoop config: để Spark biết HDFS NameNode ở đâu ---
            - name: hadoop-config
              mountPath: /opt/hadoop/conf/core-site.xml
              subPath: core-site.xml
            - name: hadoop-config
              mountPath: /opt/hadoop/conf/hdfs-site.xml
              subPath: hdfs-site.xml
            # --- Spark config: spark-env.sh + spark-defaults.conf ---
            - name: spark-config
              mountPath: /opt/spark/conf/spark-env.sh
              subPath: spark-env.sh
            - name: spark-config
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf

      volumes:
        # ConfigMap chứa core-site.xml + hdfs-site.xml (từ hadoop-config.yaml)
        - name: hadoop-config
          configMap:
            name: hadoop-config
        # ConfigMap chứa spark-env.sh + spark-defaults.conf (từ spark-config.yaml)
        - name: spark-config
          configMap:
            name: spark-config
