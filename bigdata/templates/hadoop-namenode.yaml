{{- /*
  hadoop-namenode.yaml — NameNode: Service + PVC + Deployment
  ─────────────────────────────────────────────────────────────────
  Vai trò: HDFS Master — quản lý metadata của hệ thống file phân tán
#   Chạy trên: management node (master)
  ─────────────────────────────────────────────────────────────────
  Lab 1 (mục III.1.c + d):
    - NameNode = thành phần trung tâm của HDFS
    - Lưu trữ metadata (tên file, block locations, replication info)
    - Image tự động format filesystem lần đầu (nếu PVC trống)
#   Lab 2:
#     - Truy cập WebUI: http://<master-ip>:9870
#     - Thao tác HDFS: hdfs dfs -ls, -mkdir, -put, -get, -cat
#     - Upload dữ liệu (retail.dat, people.json, v.v.) vào HDFS
  ─────────────────────────────────────────────────────────────────
  Port:
    - 9000: HDFS IPC (DataNode đăng ký, client đọc/ghi)
    - 9870: WebUI (xem trạng thái HDFS, browse files)
*/ -}}

# ==========================================================================
# SERVICE: hadoop-namenode (ClusterIP cho DNS nội bộ)
# Các thành phần khác truy cập HDFS qua: hdfs://hadoop-namenode:9000
# Truy cập WebUI: http://<master-ip>:9870 (qua hostPort)
# ==========================================================================
apiVersion: v1
kind: Service
metadata:
  name: hadoop-namenode
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  ports:
    - port: 9000
      name: hdfs-ipc           # HDFS RPC — DataNode đăng ký, client đọc/ghi
    - port: 9870
      name: hdfs-webui          # WebUI — xem trạng thái, browse HDFS files
  selector:
    app: namenode

---
# ==========================================================================
# PVC: Ổ cứng NameNode metadata ({{ .Values.hadoop.namenode.storage }})
# Lưu: fsimage (filesystem snapshot) + edit logs (transaction logs)
# Dùng local-path StorageClass → dữ liệu lưu trên node chạy pod
# ==========================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hadoop-namenode-pvc
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.hadoop.namenode.storage }}

---
# ==========================================================================
# DEPLOYMENT: hadoop-namenode → management node
# ──────────────────────────────────────────────────────────────────────────
# - Image bde2020 tự động format HDFS lần đầu + chạy NameNode foreground
# - nodeSelector → chạy cố định trên management node
# - hostPort: 9000 + 9870 → truy cập trực tiếp qua master IP
# - strategy: Recreate → chỉ 1 NameNode (không rolling update)
# ==========================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hadoop-namenode
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate                    # Chỉ 1 NameNode — không cần rolling
  selector:
    matchLabels:
      app: namenode
  template:
    metadata:
      labels:
        app: namenode
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.management.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.management.nodeSelector | indent 8 }}
      {{- end }}

      containers:
        - name: namenode
          image: {{ .Values.hadoop.namenode.image }}
          env:
            # --- Biến ENV cho bde2020 image entrypoint ---
            # Image đọc các biến này → ghi vào XML config tương ứng
            - name: CLUSTER_NAME
              value: {{ .Values.hadoop.clusterName | quote }}
            # core-site.xml: fs.defaultFS
            - name: CORE_CONF_fs_defaultFS
              value: "hdfs://hadoop-namenode:9000"
            # hdfs-site.xml: dfs.replication (= số DataNode)
            - name: HDFS_CONF_dfs_replication
              value: {{ .Values.workers.replicas | quote }}
            # Tắt hostname check (cần trong K8s — DataNode dùng Pod IP)
            - name: HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check
              value: "false"
            # Tắt kiểm tra quyền HDFS (đơn giản hóa cho lab)
            - name: HDFS_CONF_dfs_permissions_enabled
              value: "false"
          resources:
            requests:
              memory: {{ .Values.hadoop.namenode.resources.requests.memory }}
              cpu: {{ .Values.hadoop.namenode.resources.requests.cpu }}
            limits:
              memory: {{ .Values.hadoop.namenode.resources.limits.memory }}
              cpu: {{ .Values.hadoop.namenode.resources.limits.cpu }}
          ports:
            - containerPort: 9000
              hostPort: 9000          # HDFS IPC — truy cập qua Tailscale IP
              name: hdfs-ipc
            - containerPort: 9870
              hostPort: 9870          # WebUI — http://<master-ip>:9870
              name: hdfs-webui
          volumeMounts:
            # Metadata HDFS (fsimage + edit logs) → PVC bền vững
            - name: namenode-data
              mountPath: /hadoop/dfs/name

      volumes:
        - name: namenode-data
          persistentVolumeClaim:
            claimName: hadoop-namenode-pvc
