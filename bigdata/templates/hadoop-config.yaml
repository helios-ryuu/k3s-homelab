{{- /*
  hadoop-config.yaml — ConfigMap chứa các file XML cấu hình Hadoop
  ─────────────────────────────────────────────────────────────────
  Mục đích: Cung cấp cấu hình cho bde2020 Hadoop images VÀ Spark pods
  ─────────────────────────────────────────────────────────────────
  Lab 1 (mục III.1.c + III.1.d):
    - core-site.xml:  Địa chỉ NameNode (fs.defaultFS)
    - hdfs-site.xml:  Số nhân bản (dfs.replication), tắt hostname check
    - yarn-site.xml:  ResourceManager hostname, NodeManager resources
    - mapred-site.xml: Framework MapReduce = YARN
  Lab 2:
    - mapred-site.xml: mapreduce.framework.name = yarn
      → Cho phép chạy MapReduce job (WordCount, retail.dat) trên YARN
  ─────────────────────────────────────────────────────────────────
  LƯU Ý: bde2020 images cũng đọc biến ENV CORE_CONF_*, HDFS_CONF_*,
  YARN_CONF_*, MAPRED_CONF_* để ghi đè config. ConfigMap này chủ yếu
  phục vụ Spark pods (mount trực tiếp vào /opt/hadoop/conf/).
  dfs.replication tự động = workers.replicas
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: hadoop-config
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  # -----------------------------------------------------------------------
  # core-site.xml — Địa chỉ NameNode (DNS nội bộ K8s)
  # -----------------------------------------------------------------------
  # Lab 1 (mục III.1.c): fs.defaultFS = hdfs://host:port
  # Ở đây dùng DNS K8s "hadoop-namenode" thay vì IP tĩnh
  # Tất cả thành phần (DataNode, Spark, v.v.) trỏ về đây để đọc/ghi HDFS
  core-site.xml: |
    <configuration>
      <property>
        <name>fs.defaultFS</name>
        <value>hdfs://hadoop-namenode:9000</value>
      </property>
    </configuration>

  # -----------------------------------------------------------------------
  # hdfs-site.xml — Replication + Quyền HDFS
  # -----------------------------------------------------------------------
  # Lab 1 (mục III.1.c): dfs.replication = số nhân bản dữ liệu
  #   → Tự động bằng số worker (replicas) — VD: 2 workers = 2 bản sao
  # Lab 1 (mục III.1.d): dfs.permissions.enabled = false
  #   → Tắt kiểm tra quyền trên HDFS (lab environment, đơn giản hóa)
  # dfs.namenode.datanode.registration.ip-hostname-check = false
  #   → Bắt buộc trong K8s vì DataNode đăng ký bằng Pod IP, không hostname
  hdfs-site.xml: |
    <configuration>
      <property>
        <name>dfs.replication</name>
        <value>{{ .Values.workers.replicas }}</value>
      </property>
      <property>
        <name>dfs.namenode.datanode.registration.ip-hostname-check</name>
        <value>false</value>
      </property>
      <property>
        <name>dfs.permissions.enabled</name>
        <value>false</value>
      </property>
    </configuration>

  # -----------------------------------------------------------------------
  # yarn-site.xml — YARN ResourceManager + NodeManager
  # -----------------------------------------------------------------------
  # Lab 1 (mục III.1.c): cấu hình YARN
  # Lab 2: YARN quản lý tài nguyên cho MapReduce jobs
  #
  # yarn.resourcemanager.hostname → DNS K8s của ResourceManager pod
  # yarn.nodemanager.aux-services = mapreduce_shuffle
  #   → Bắt buộc cho MapReduce (xáo trộn dữ liệu giữa Map và Reduce phase)
  # yarn.nodemanager.resource.memory-mb / cpu-vcores
  #   → Tài nguyên mỗi NodeManager cấp cho YARN containers
  yarn-site.xml: |
    <configuration>
      <property>
        <name>yarn.resourcemanager.hostname</name>
        <value>hadoop-resourcemanager</value>
      </property>
      <property>
        <name>yarn.nodemanager.aux-services</name>
        <value>mapreduce_shuffle</value>
      </property>
      <property>
        <name>yarn.nodemanager.resource.memory-mb</name>
        <value>{{ .Values.hadoop.nodemanager.memory }}</value>
      </property>
      <property>
        <name>yarn.nodemanager.resource.cpu-vcores</name>
        <value>{{ .Values.hadoop.nodemanager.vcores }}</value>
      </property>
    </configuration>

  # -----------------------------------------------------------------------
  # mapred-site.xml — MapReduce qua YARN
  # -----------------------------------------------------------------------
  # Lab 1 (mục III.1.c): mapreduce.framework.name = yarn
  #   → Chạy MapReduce trên YARN thay vì local mode
  # Lab 2: Chạy WordCount, retail.dat analysis qua YARN
  #
  # yarn.app.mapreduce.am.env / mapreduce.map.env / mapreduce.reduce.env
  #   → Đường dẫn HADOOP_MAPRED_HOME cho MapReduce containers
  #   → Cần thiết để containers tìm được thư viện MapReduce
  mapred-site.xml: |
    <configuration>
      <property>
        <name>mapreduce.framework.name</name>
        <value>yarn</value>
      </property>
      <property>
        <name>yarn.app.mapreduce.am.env</name>
        <value>HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/</value>
      </property>
      <property>
        <name>mapreduce.map.env</name>
        <value>HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/</value>
      </property>
      <property>
        <name>mapreduce.reduce.env</name>
        <value>HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/</value>
      </property>
    </configuration>
