{{- /*
  hadoop-datanode.yaml — HDFS DataNode: Headless Service + StatefulSet
  ─────────────────────────────────────────────────────────────────
  Vai trò: HDFS Worker — lưu trữ block dữ liệu thực tế
#   replicas={{ .Values.workers.replicas }} (mặc định 2 workers)
  ─────────────────────────────────────────────────────────────────
  Lab 1 (mục III.1.d):
    - DataNode = nơi lưu block dữ liệu (mỗi file HDFS chia thành blocks)
    - Số DataNode = số worker nodes trong cụm
    - Tương đương "máy con" trong hướng dẫn cài đặt phân tán
  Lab 2:
    - Khi hdfs dfs -put file → NameNode chia file → DataNode lưu blocks
    - dfs.replication = {{ .Values.workers.replicas }}
      → Mỗi block được nhân bản trên N DataNode
  ─────────────────────────────────────────────────────────────────
  Luật điều phối:
#     - CHỈ chạy trên workerNodes (distributed)
    - CẤM 2 DataNode chung 1 node (podAntiAffinity)
#     - Tolerate taint control-plane (master node)
  Fault tolerance:
    - 1 worker offline → 1 DataNode Pending, HDFS vẫn hoạt động
      (dữ liệu có bản sao trên DataNode còn lại)
    - 2 workers offline → tất cả DataNode Pending, HDFS không có worker
*/ -}}

# ==========================================================================
# HEADLESS SERVICE: hadoop-datanode
# DNS tự động: hadoop-datanode-0.hadoop-datanode, hadoop-datanode-1.hadoop-datanode
# ClusterIP: None → StatefulSet dùng DNS nội bộ để định danh
# ==========================================================================
apiVersion: v1
kind: Service
metadata:
  name: hadoop-datanode
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  clusterIP: None
  ports:
    - port: 9864
      name: datanode-webui      # WebUI mỗi DataNode
    - port: 9866
      name: datanode-data       # Port truyền block dữ liệu
  selector:
    app: datanode

---
# ==========================================================================
# STATEFULSET: hadoop-datanode (worker nodes only)
# replicas: {{ .Values.workers.replicas }}
# Scale: helm upgrade bigd . --set workers.replicas=3
# volumeClaimTemplates: mỗi DataNode pod có PVC riêng (dữ liệu bền vững)
# ==========================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hadoop-datanode
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podManagementPolicy: Parallel
  replicas: {{ .Values.workers.replicas }}
  serviceName: hadoop-datanode
  selector:
    matchLabels:
      app: datanode
  template:
    metadata:
      labels:
        app: datanode
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # === LUẬT ĐIỀU PHỐI (Scheduling Rules) ===

      # Tolerate master taint: control-plane node
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      {{- if .Values.worker.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.worker.nodeSelector | indent 8 }}
      {{- end }}
      affinity:

        # CẤM 2 DataNode chung 1 node → mỗi node 1 DataNode duy nhất
        # Nếu worker node offline → pod sẽ Pending (không reschedule)
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - datanode
            topologyKey: kubernetes.io/hostname

      containers:
        - name: datanode
          image: {{ .Values.hadoop.datanode.image }}
          env:
            # --- Biến ENV cho bde2020 image entrypoint ---
            # core-site.xml: trỏ về NameNode
            - name: CORE_CONF_fs_defaultFS
              value: "hdfs://hadoop-namenode:9000"
            # hdfs-site.xml: số nhân bản
            - name: HDFS_CONF_dfs_replication
              value: {{ .Values.workers.replicas | quote }}
            # Tắt hostname check (bắt buộc trong K8s)
            - name: HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check
              value: "false"
            # Tắt kiểm tra quyền HDFS (lab environment)
            - name: HDFS_CONF_dfs_permissions_enabled
              value: "false"
            # YARN ResourceManager hostname (để DataNode cũng biết YARN)
            - name: YARN_CONF_yarn_resourcemanager_hostname
              value: "hadoop-resourcemanager"
          resources:
            requests:
              memory: {{ .Values.hadoop.datanode.resources.requests.memory }}
              cpu: {{ .Values.hadoop.datanode.resources.requests.cpu }}
            limits:
              memory: {{ .Values.hadoop.datanode.resources.limits.memory }}
              cpu: {{ .Values.hadoop.datanode.resources.limits.cpu }}
          ports:
            - containerPort: 9864
              hostPort: 9864          # WebUI mỗi DataNode (qua Tailscale IP)
              name: datanode-webui
            - containerPort: 9866
              name: datanode-data     # Port truyền block dữ liệu
          volumeMounts:
            # Block dữ liệu HDFS → PVC bền vững (mỗi pod có PVC riêng)
            - name: datanode-data
              mountPath: /hadoop/dfs/data

  # PVC tự động cho mỗi DataNode pod (volumeClaimTemplates)
  # Mỗi DataNode-0, DataNode-1, ... có PVC riêng: datanode-data-hadoop-datanode-N
  volumeClaimTemplates:
    - metadata:
        name: datanode-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: {{ .Values.hadoop.datanode.storage }}
