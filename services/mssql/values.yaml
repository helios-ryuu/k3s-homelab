# =================================================================
# MSSQL Server 2025 — Distributed trên K3s
# =================================================================
# Deploy:  ./k3s.sh deploy mssql
# Delete:  ./k3s.sh delete mssql
# Check:   ./services/mssql.sh check
# =================================================================
#
# ┌──────────────────────────────────────────────────────────────┐
# │                   PHÂN BỔ INSTANCE                          │
# ├──────────────┬──────────────┬────────────────────────────────┤
# │ Pod          │ Node         │ Vai trò trong Lab 4            │
# ├──────────────┼──────────────┼────────────────────────────────┤
# │ mssql-db-0   │ node-1       │ Chi nhánh 1 (user QLCN1)      │
# │              │              │ + Hội sở (user QLHS)           │
# ├──────────────┼──────────────┼────────────────────────────────┤
# │ mssql-db-1   │ node-2       │ Chi nhánh 2 (user QLCN2)      │
# │              │              │                                │
# ├──────────────┼──────────────┼────────────────────────────────┤
# │ mssql-db-2   │ node-3       │ Chi nhánh 3 (user QLCN3)      │
# │              │              │ (tạm thời, scale down về 2)   │
# └──────────────┴──────────────┴────────────────────────────────┘
#
# Fault Tolerance:
# - Deploy ban đầu: 3 replicas (distributed nodes)
# - Scale xuống 2 sau khi setup xong: mng.sh scale mssql 2
# - Bất kỳ node nào offline → pod Pending, các pod khác vẫn chạy
# - PVC giữ nguyên data khi pod restart / node reboot
# - mssql-db-2 trên node-3 sẽ Pending khi scale=2, tự recovery
#   khi scale=3 lại và node-3 online
#
# ┌──────────────────────────────────────────────────────────────┐
# │        LAB 4 — MAPPING BÀI TẬP THỰC HÀNH                  │
# ├──────────────────────────────────────────────────────────────┤
# │ Cơ sở dữ liệu:                                             │
# │   • KHACHHANG(MaKH, TenKH, TongTien)                       │
# │   • CHINHANH(MaCN, TenCN)                                  │
# │   • GIAODICH(MaGD, MaCN, MaKH, SoTienGD, LoaiGD)          │
# │                                                             │
# │ Users & Roles:                                              │
# │   • QLCN1/QLCN2/QLCN3: quản lý mỗi chi nhánh              │
# │   • QLHS: quản lý Hội sở (trên mssql-db-0)                │
# │   • GUEST: giao dịch (INSERT/SELECT GIAODICH,              │
# │            SELECT KHACHHANG)                                │
# │   • role_GIAODICH → gán cho GUEST                          │
# │                                                             │
# │ Linked Server:                                              │
# │   • mssql-db-0 ↔ mssql-db-1 (hai chiều qua headless DNS)  │
# │   • Endpoint: mssql-db-X.mssql-svc.mssql.svc.cluster.local │
# │   • Dùng user GUEST để kết nối Linked Server                │
# │                                                             │
# │ SQL Server Replication:                                     │
# │   • Publisher: mỗi chi nhánh (snapshot/transactional)       │
# │   • Subscriber: Hội sở (mssql-db-0)                        │
# │   • Distributor: local trên mỗi chi nhánh                  │
# │                                                             │
# │ Trigger (trên user QLCNx):                                 │
# │   • CapNhatGD: AFTER INSERT ON GIAODICH                    │
# │     - LoaiGD='G' → cộng SoTienGD vào TongTien             │
# │     - LoaiGD='R' → trừ SoTienGD khỏi TongTien             │
# │                                                             │
# │ Procedures (trên user GUEST):                               │
# │   • GuiTien(@MaKH, @SoTienGD):                             │
# │     - Kiểm tra KH thuộc chi nhánh mình?                    │
# │     - Nếu có → INSERT GIAODICH                             │
# │     - Nếu không → kiểm tra qua Linked Server               │
# │       → INSERT GIAODICH ở chi nhánh tìm thấy KH            │
# │   • RutTien(@MaKH, @SoTienGD): tương tự GuiTien            │
# └──────────────────────────────────────────────────────────────┘
#
# Kết nối từ bên ngoài (SSMS / DataGrip):
#   Host: <Tailscale IP>  Port: 31433 (NodePort)
#   Node 1 IP:    <node-1-ip>:31433
#   Node 2 IP:    <node-2-ip>:31433
#   Node 3 IP:    <node-3-ip>:31433
#   User: sa  |  Pass: (see .env MSSQL_PASSWORD)
#
# Kết nối nội bộ (Linked Server endpoint):
#   mssql-db-0.mssql-svc.mssql.svc.cluster.local,1433
#   mssql-db-1.mssql-svc.mssql.svc.cluster.local,1433
#   mssql-db-2.mssql-svc.mssql.svc.cluster.local,1433
# =================================================================

# Deploy ban đầu: 3 replicas, scale xuống 2 sau khi setup
replicas: 3

# Label để chọn node deploy MSSQL
mssql:
  # MSSQL 2025 — image chính (engine)
  image: mcr.microsoft.com/mssql/server:2025-latest
  # mssql-tools18: ODBC 18 (secure by default, encryption-first)
  # Path: /opt/mssql-tools18/bin/sqlcmd
  # Lưu ý: -No (TrustServerCertificate) cần thiết cho self-signed cert
  initImage: mcr.microsoft.com/mssql/server:2025-latest
  # password: kubectl get secret infra-secrets -n mssql
  pid: Developer
  database: MSSQLDB
  storage: 10Gi

  memoryLimitMB: 2048
  resources:
    requests:
      memory: 1Gi
      cpu: "2"
    limits:
      memory: 3Gi
      cpu: "6"

  tasksetCores: "0,1"

# NodePort cho kết nối từ bên ngoài (SSMS, DataGrip)
# Truy cập: <Tailscale-IP>:31433
nodePort: 31433
nodeSelector:
  node-role.kubernetes.io/database-mssql: "true"
