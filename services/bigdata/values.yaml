# values.yaml — Hadoop 3.2.1 (HDFS + YARN) + Spark 3.5.8
#
# Topology:
#   Management node (bigdata-master):
#     NameNode (HDFS master), ResourceManager (YARN master), Spark Master
#   Worker nodes (bigdata-worker, one pod per node):
#     DataNode (HDFS storage), NodeManager (YARN executor), Spark Worker
#
# Node offline tolerance:
#   Worker offline → pods Pending; HDFS unavailable until node recovers
#   Management pods pinned to master → stable as long as master is up
#
# Access:
#   HDFS WebUI:   http://<master-ip>:9870
#   YARN WebUI:   http://<master-ip>:8088
#   Spark WebUI:  http://<any-node-ip>:30808  (NodePort)
#   Worker WebUI: http://<worker-ip>:8081
#
# Scale workers:
#   bash ./services/bigdata.sh scale 1   # restore 1 worker (default)
#   bash ./services/bigdata.sh scale 0   # scale down all (avoids HDFS crash-restart loop)
#
# Run interactive PySpark:
#   kubectl exec -it -n bigdata deploy/spark-master -- /opt/spark/bin/pyspark
#
# Lab mapping (what each component serves):
#   Lab 1: Full cluster install — all components
#   Lab 2: HDFS + MapReduce — NameNode (:9870), DataNode, YARN (:8088)
#   Lab 3: PySpark RDD        — Spark Master + Worker
#   Lab 4: DataFrame/SQL      — Spark Master + Worker (sql.warehouse.dir on HDFS)
#   Lab 5: MLlib              — Spark Master + Worker
#   Lab 7: GraphFrames        — spark.jars.packages auto-downloads graphframes on start

# --- WORKER REPLICAS ---
# Controls DataNode + NodeManager + SparkWorker count.
# podAntiAffinity ensures no 2 pods of same type on same node.
# Workers: helios (bigdata-worker) + diepvi (bigdata-worker)
# sinister label removed — node unreliable, caused DataNode pipeline failures
workers:
  replicas: 0

# --- NODE SELECTORS ---
management:
  nodeSelector:
    node-role.kubernetes.io/bigdata-master: "true"

worker:
  nodeSelector:
    node-role.kubernetes.io/bigdata-worker: "true"

# =================================================================
# HADOOP 3.2.1 (bde2020 images)
# Images read CORE_CONF_*, HDFS_CONF_*, YARN_CONF_*, MAPRED_CONF_*
# env vars and write them into XML config files on startup.
# NameNode auto-formats HDFS on first run if PVC is empty.
# =================================================================
hadoop:
  clusterName: k3s-hadoop-cluster

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    storage: 10Gi    # PVC for /hadoop/dfs/name (fsimage + edit logs)
    resources:
      requests:
        memory: 512Mi
        cpu: "500m"
      limits:
        memory: 6Gi
        cpu: "8000m"

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    storage: 20Gi    # PVC for /hadoop/dfs/data (block storage, per pod)
    resources:
      requests:
        memory: 512Mi
        cpu: "500m"
      limits:
        memory: 6Gi
        cpu: "14000m"

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    resources:
      requests:
        memory: 512Mi
        cpu: "500m"
      limits:
        memory: 6Gi
        cpu: "8000m"

  # memory + vcores = resources each NodeManager advertises to YARN
  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    memory: 5120    # yarn.nodemanager.resource.memory-mb
                    # Budget per 8GB node: OS+K3s+Tailscale ~800MB, DataNode ~300MB,
                    # SparkWorker ~300MB, NM daemon ~512MB → ~6100MB free → 5120MB (1GB buffer)
    vcores: 6       # yarn.nodemanager.resource.cpu-vcores (leave headroom for OS+pods)
    resources:
      requests:
        memory: 512Mi
        cpu: "500m"
      limits:
        memory: 7Gi   # 5120MB YARN containers + ~1.5GB NM daemon overhead
        cpu: "10000m"

  # MapReduce container memory + JVM tuning
  # ItemPartitioner partitions by first item A → count(A), count(A,B), count(A,B,C)
  # land on same reducer → correct probability.
  # 4 reducers × 2560MB = 10240MB; each NM holds floor(5120/2560)=2 reducers
  # → 4 reducers fit across 2 NMs in 1 wave (no restart needed)
  #
  # Observed job (retail.dat, 88k txns): map 194M spilled records due to default
  # io.sort.mb=100MB; increased to 512MB → requires map container ≥ 2048MB.
  # One reducer OOM-killed (peak 2022MB vs 2048MB limit) → bumped to 2560MB.
  mapreduce:
    numReducers: "4"
    taskTimeoutMs: "1800000"   # 30 min (default 600s too short for Tailscale shuffle)
    map:
      memoryMb: "2048"         # was 1024 → needs room for 512MB sort buffer
      javaOpts: "-Xmx1536m -XX:+UseG1GC"
      sortMb: "512"            # mapreduce.task.io.sort.mb; default 100 → 194M spilled records
    reduce:
      memoryMb: "2560"         # was 2048 → peak 2022MB killed 1 reducer; 2560 gives headroom
      javaOpts: "-Xmx2048m -XX:+UseG1GC -XX:ConcGCThreads=1 -XX:ParallelGCThreads=2"
    # Shuffle tuning for Tailscale VPN (cross-node latency 5-30ms, possible slow links)
    shuffle:
      parallelCopies: "10"      # parallel map-output fetches per reducer (default 5)
      connectTimeoutMs: "30000" # 30s TCP connect timeout (Tailscale peer handshake can be slow)
      readTimeoutMs: "60000"    # 60s read timeout per transfer chunk
      mergePercent: "0.55"      # start in-memory merge at 55% buffer full (default 0.66)
                                # avoids buffer-full stall during slow cross-node transfers
      maxAttempts: "20"         # was 10 → tolerate more transient fetch failures per map output
      keepAliveEnable: "true"   # reuse HTTP connections across fetches (reduce Tailscale handshakes)
      maxFetchFailures: "20"    # max consecutive fetch failures before aborting shuffle (default 10)

  # HDFS fault tolerance — prevent reducer write from aborting when a DataNode drops mid-job
  hdfs:
    replaceDatanodeOnFailureEnable: "false"   # don't abort pipeline when a DN disappears;
                                              # continue writing to remaining nodes with reduced replication

  home: /opt/hadoop-3.2.1    # Hadoop install path in bde2020 images

# =================================================================
# SPARK 3.5.8 (apache/spark:3.5.8-python3)
# Scala 2.12 + Java 17 + Python 3. Bundled Hadoop client for HDFS.
# GraphFrames 0.8.4 requires Spark 3.5 + Scala 2.12 (s_2.12).
# =================================================================
spark:
  master:
    image: apache/spark:3.5.8-python3
    resources:
      requests:
        memory: 512Mi
        cpu: "500m"
      limits:
        memory: 6Gi
        cpu: "8000m"

  # cores + memory = resources each Worker registers with Master
  worker:
    image: apache/spark:3.5.8-python3
    cores: 2
    memory: 2G
    resources:
      requests:
        memory: 512Mi
        cpu: "500m"
      limits:
        memory: 6Gi
        cpu: "14000m"

  # GraphFrames package (Lab 7) — auto-downloaded via spark.jars.packages
  graphframes:
    package: "graphframes:graphframes:0.8.4-spark3.5-s_2.12"
