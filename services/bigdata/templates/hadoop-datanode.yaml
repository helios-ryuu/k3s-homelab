{{- /*
  hadoop-datanode.yaml — DataNode: Headless Service + StatefulSet
  ─────────────────────────────────────────────────────────────────
  Role: HDFS Worker — stores actual data blocks
  replicas: {{ .Values.workers.replicas }} (one per worker node)

  Ports:
    9864 — DataNode WebUI
    9866 — Block transfer port

  Scheduling:
    - nodeSelector: bigdata-worker nodes only
    - podAntiAffinity (required): no 2 DataNodes on the same node
    - Offline worker → pod Pending; HDFS still serves from other replicas
*/ -}}

# Headless Service: enables StatefulSet DNS (hadoop-datanode-N.hadoop-datanode)
apiVersion: v1
kind: Service
metadata:
  name: hadoop-datanode
  labels:
    app.kubernetes.io/name: bigdata
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  clusterIP: None
  ports:
    - port: 9864
      name: datanode-webui
    - port: 9866
      name: datanode-data
  selector:
    app: datanode

---
# StatefulSet: one DataNode per worker node, each with its own PVC
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hadoop-datanode
  labels:
    app.kubernetes.io/name: bigdata
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podManagementPolicy: Parallel
  replicas: {{ .Values.workers.replicas }}
  serviceName: hadoop-datanode
  selector:
    matchLabels:
      app: datanode
  template:
    metadata:
      labels:
        app: datanode
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - datanode
              topologyKey: kubernetes.io/hostname
      containers:
        - name: datanode
          image: {{ .Values.hadoop.datanode.image }}
          env:
            # bde2020 env → core-site.xml
            - name: CORE_CONF_fs_defaultFS
              value: "hdfs://hadoop-namenode:9000"
            # bde2020 env → hdfs-site.xml
            - name: HDFS_CONF_dfs_replication
              value: {{ .Values.workers.replicas | quote }}
            - name: HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check
              value: "false"
            - name: HDFS_CONF_dfs_permissions_enabled
              value: "false"
            # bde2020 env → yarn-site.xml (DataNode needs YARN info for co-location)
            - name: YARN_CONF_yarn_resourcemanager_hostname
              value: "hadoop-resourcemanager"
          resources:
            requests:
              memory: {{ .Values.hadoop.datanode.resources.requests.memory | quote }}
              cpu: {{ .Values.hadoop.datanode.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.hadoop.datanode.resources.limits.memory | quote }}
              cpu: {{ .Values.hadoop.datanode.resources.limits.cpu | quote }}
          ports:
            - containerPort: 9864
              hostPort: 9864
              name: datanode-webui
            - containerPort: 9866
              name: datanode-data
          volumeMounts:
            - name: datanode-data
              mountPath: /hadoop/dfs/data
  # Each DataNode gets its own PVC: datanode-data-hadoop-datanode-N
  volumeClaimTemplates:
    - metadata:
        name: datanode-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: {{ .Values.hadoop.datanode.storage }}
