{{- /*
  hadoop-rmgr.yaml — YARN ResourceManager: Service + Deployment
  ─────────────────────────────────────────────────────────────────
  Role: YARN Master — schedules MapReduce jobs and allocates cluster resources
  Runs on: management node (pinned via nodeSelector)

  Ports:
    8088 — WebUI: view running/completed jobs, cluster resource usage
    8030 — Scheduler IPC: ApplicationMaster requests resources
    8031 — Resource Tracker: NodeManager heartbeats
    8032 — Client RPC: job submission (yarn jar ...)
    8033 — Admin RPC: rmadmin commands

  Design: strategy Recreate — only 1 ResourceManager, no rolling update needed
*/ -}}

# Service: internal DNS "hadoop-resourcemanager" for YARN access
apiVersion: v1
kind: Service
metadata:
  name: hadoop-resourcemanager
  labels:
    app.kubernetes.io/name: bigdata
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  ports:
    - port: 8088
      name: yarn-webui
    - port: 8030
      name: yarn-scheduler
    - port: 8031
      name: yarn-tracker
    - port: 8032
      name: yarn-ipc
    - port: 8033
      name: yarn-admin
  selector:
    app: resourcemanager

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hadoop-resourcemanager
  labels:
    app.kubernetes.io/name: bigdata
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: resourcemanager
  template:
    metadata:
      labels:
        app: resourcemanager
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
      {{- with .Values.management.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: resourcemanager
          image: {{ .Values.hadoop.resourcemanager.image }}
          env:
            # bde2020 env → core-site.xml
            - name: CORE_CONF_fs_defaultFS
              value: "hdfs://hadoop-namenode:9000"
            # bde2020 env → yarn-site.xml
            - name: YARN_CONF_yarn_resourcemanager_hostname
              value: "hadoop-resourcemanager"
            - name: YARN_CONF_yarn_nodemanager_aux___services
              value: "mapreduce_shuffle"
            - name: YARN_CONF_yarn_nodemanager_resource_memory___mb
              value: {{ .Values.hadoop.nodemanager.memory | quote }}
            - name: YARN_CONF_yarn_nodemanager_resource_cpu___vcores
              value: {{ .Values.hadoop.nodemanager.vcores | quote }}
            # bde2020 env → mapred-site.xml
            - name: MAPRED_CONF_mapreduce_framework_name
              value: "yarn"
            - name: MAPRED_CONF_yarn_app_mapreduce_am_env
              value: "HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/"
            - name: MAPRED_CONF_mapreduce_map_env
              value: "HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/"
            - name: MAPRED_CONF_mapreduce_reduce_env
              value: "HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/"
            - name: MAPRED_CONF_mapreduce_task_timeout
              value: {{ .Values.hadoop.mapreduce.taskTimeoutMs | quote }}
            # Shuffle tuning — Tailscale VPN adds latency; default settings cause stalls
            - name: MAPRED_CONF_mapreduce_reduce_shuffle_parallelcopies
              value: {{ .Values.hadoop.mapreduce.shuffle.parallelCopies | quote }}
            - name: MAPRED_CONF_mapreduce_reduce_shuffle_connect_timeout
              value: {{ .Values.hadoop.mapreduce.shuffle.connectTimeoutMs | quote }}
            - name: MAPRED_CONF_mapreduce_reduce_shuffle_read_timeout
              value: {{ .Values.hadoop.mapreduce.shuffle.readTimeoutMs | quote }}
            - name: MAPRED_CONF_mapreduce_reduce_shuffle_merge_percent
              value: {{ .Values.hadoop.mapreduce.shuffle.mergePercent | quote }}
            - name: MAPRED_CONF_mapreduce_reduce_shuffle_maxattempts
              value: {{ .Values.hadoop.mapreduce.shuffle.maxAttempts | quote }}
            - name: MAPRED_CONF_mapreduce_shuffle_connection___keep___alive___enable
              value: {{ .Values.hadoop.mapreduce.shuffle.keepAliveEnable | quote }}
          resources:
            requests:
              memory: {{ .Values.hadoop.resourcemanager.resources.requests.memory | quote }}
              cpu: {{ .Values.hadoop.resourcemanager.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.hadoop.resourcemanager.resources.limits.memory | quote }}
              cpu: {{ .Values.hadoop.resourcemanager.resources.limits.cpu | quote }}
          ports:
            - containerPort: 8088
              hostPort: 8088
              name: yarn-webui
            - containerPort: 8030
              name: yarn-scheduler
            - containerPort: 8031
              name: yarn-tracker
            - containerPort: 8032
              name: yarn-ipc
            - containerPort: 8033
              name: yarn-admin
