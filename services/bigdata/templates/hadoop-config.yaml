{{- /*
  hadoop-config.yaml — ConfigMap with Hadoop XML config files
  ─────────────────────────────────────────────────────────────
  Consumed by:
    - bde2020 Hadoop images (read XML directly from mounted path)
    - Spark pods (mounted at /opt/hadoop/conf/ so Spark finds NameNode)

  Notes:
    - dfs.replication = workers.replicas (auto from values)
    - dfs.permissions.enabled = false (lab environment simplification)
    - ip-hostname-check = false (required in K8s: DataNodes register by Pod IP)
    - mapreduce.framework.name = yarn (enables YARN-mode MapReduce jobs)
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: hadoop-config
  labels:
    app.kubernetes.io/name: bigdata
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  # core-site.xml — HDFS NameNode address (used by all components)
  core-site.xml: |
    <configuration>
      <property>
        <name>fs.defaultFS</name>
        <value>hdfs://hadoop-namenode:9000</value>
      </property>
    </configuration>

  # hdfs-site.xml — Replication factor + K8s compatibility flags
  hdfs-site.xml: |
    <configuration>
      <property>
        <name>dfs.replication</name>
        <value>{{ .Values.workers.replicas }}</value>
      </property>
      <property>
        <name>dfs.namenode.datanode.registration.ip-hostname-check</name>
        <value>false</value>
      </property>
      <property>
        <name>dfs.permissions.enabled</name>
        <value>false</value>
      </property>
    </configuration>

  # yarn-site.xml — YARN ResourceManager + NodeManager config
  yarn-site.xml: |
    <configuration>
      <property>
        <name>yarn.resourcemanager.hostname</name>
        <value>hadoop-resourcemanager</value>
      </property>
      <property>
        <name>yarn.nodemanager.aux-services</name>
        <value>mapreduce_shuffle</value>
      </property>
      <property>
        <name>yarn.nodemanager.resource.memory-mb</name>
        <value>{{ .Values.hadoop.nodemanager.memory }}</value>
      </property>
      <property>
        <name>yarn.nodemanager.resource.cpu-vcores</name>
        <value>{{ .Values.hadoop.nodemanager.vcores }}</value>
      </property>
    </configuration>

  # mapred-site.xml — Run MapReduce jobs on YARN (not local mode)
  mapred-site.xml: |
    <configuration>
      <property>
        <name>mapreduce.framework.name</name>
        <value>yarn</value>
      </property>
      <property>
        <name>yarn.app.mapreduce.am.env</name>
        <value>HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/</value>
      </property>
      <property>
        <name>mapreduce.map.env</name>
        <value>HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/</value>
      </property>
      <property>
        <name>mapreduce.reduce.env</name>
        <value>HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/</value>
      </property>
    </configuration>
