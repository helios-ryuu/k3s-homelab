{{- /*
  hadoop-nodemgr.yaml — YARN NodeManager: Headless Service + StatefulSet
  ─────────────────────────────────────────────────────────────────
  Role: YARN Worker — executes MapReduce containers on worker nodes
  replicas: {{ .Values.workers.replicas }} (one per worker node)

  Port:
    8042 — NodeManager WebUI (per-worker job/container status)

  Scheduling: same rules as DataNode
    - nodeSelector: bigdata-worker nodes only
    - podAntiAffinity (required): no 2 NodeManagers on the same node
*/ -}}

# Headless Service: enables StatefulSet DNS (hadoop-nodemanager-N.hadoop-nodemanager)
apiVersion: v1
kind: Service
metadata:
  name: hadoop-nodemanager
  labels:
    app.kubernetes.io/name: bigdata
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  clusterIP: None
  ports:
    - port: 8042
      name: nm-webui
  selector:
    app: nodemanager

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hadoop-nodemanager
  labels:
    app.kubernetes.io/name: bigdata
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podManagementPolicy: Parallel
  replicas: {{ .Values.workers.replicas }}
  serviceName: hadoop-nodemanager
  selector:
    matchLabels:
      app: nodemanager
  template:
    metadata:
      labels:
        app: nodemanager
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - nodemanager
              topologyKey: kubernetes.io/hostname
      containers:
        - name: nodemanager
          image: {{ .Values.hadoop.nodemanager.image }}
          env:
            # bde2020 env → core-site.xml
            - name: CORE_CONF_fs_defaultFS
              value: "hdfs://hadoop-namenode:9000"
            # bde2020 env → yarn-site.xml
            - name: YARN_CONF_yarn_resourcemanager_hostname
              value: "hadoop-resourcemanager"
            - name: YARN_CONF_yarn_nodemanager_aux___services
              value: "mapreduce_shuffle"
            - name: YARN_CONF_yarn_nodemanager_resource_memory___mb
              value: {{ .Values.hadoop.nodemanager.memory | quote }}
            - name: YARN_CONF_yarn_nodemanager_resource_cpu___vcores
              value: {{ .Values.hadoop.nodemanager.vcores | quote }}
            # Disable vmem check — G1GC reserves large virtual memory in containers
            # causing YARN to kill containers that are physically within limits
            - name: YARN_CONF_yarn_nodemanager_vmem___check___enabled
              value: "false"
            - name: YARN_CONF_yarn_nodemanager_pmem___check___enabled
              value: "false"
            # bde2020 env → mapred-site.xml
            - name: MAPRED_CONF_mapreduce_framework_name
              value: "yarn"
            - name: MAPRED_CONF_yarn_app_mapreduce_am_env
              value: "HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/"
            - name: MAPRED_CONF_mapreduce_map_env
              value: "HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/"
            - name: MAPRED_CONF_mapreduce_reduce_env
              value: "HADOOP_MAPRED_HOME={{ .Values.hadoop.home }}/"
            - name: MAPRED_CONF_mapreduce_map_memory_mb
              value: {{ .Values.hadoop.mapreduce.map.memoryMb | quote }}
            - name: MAPRED_CONF_mapreduce_map_java_opts
              value: {{ .Values.hadoop.mapreduce.map.javaOpts | quote }}
            - name: MAPRED_CONF_mapreduce_reduce_memory_mb
              value: {{ .Values.hadoop.mapreduce.reduce.memoryMb | quote }}
            - name: MAPRED_CONF_mapreduce_reduce_java_opts
              value: {{ .Values.hadoop.mapreduce.reduce.javaOpts | quote }}
            - name: MAPRED_CONF_mapreduce_job_reduces
              value: {{ .Values.hadoop.mapreduce.numReducers | quote }}
          resources:
            requests:
              memory: {{ .Values.hadoop.nodemanager.resources.requests.memory | quote }}
              cpu: {{ .Values.hadoop.nodemanager.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.hadoop.nodemanager.resources.limits.memory | quote }}
              cpu: {{ .Values.hadoop.nodemanager.resources.limits.cpu | quote }}
          ports:
            - containerPort: 8042
              hostPort: 8042
              name: nm-webui
