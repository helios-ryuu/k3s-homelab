{{- /*
  spark-master.yaml — Spark Master: Service (NodePort) + Deployment
  ─────────────────────────────────────────────────────────────────
  Role: Spark Standalone master — schedules and coordinates all Spark jobs
  Runs on: management node (pinned via nodeSelector)

  Ports:
    7077  — Spark RPC: worker registration + spark-submit job submission
    8080  — WebUI (exposed as NodePort 30808, accessible from any node)

  Design notes:
    - enableServiceLinks: false — prevents K8s from injecting PORT env vars
      which collide with Spark's own PORT variable (causes bind crash)
    - SPARK_LOCAL_HOSTNAME = Pod IP (via Downward API) — Spark must advertise
      its Pod IP, not hostname. Pod hostnames are not DNS-resolvable from
      other nodes, causing executor UnknownHostException errors.
    - No --host flag in args: SPARK_LOCAL_HOSTNAME controls the advertised
      address; letting Spark bind to the default (0.0.0.0) is correct.
    - NodePort 30808: avoids hostPort 8080 conflicts with Traefik/YARN
*/ -}}

# Service: ClusterIP for RPC + NodePort 30808 for WebUI
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  labels:
    app.kubernetes.io/name: bigdata
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: NodePort
  ports:
    - port: 7077
      targetPort: 7077
      name: spark-rpc
    - port: 8080
      targetPort: 8080
      nodePort: 30808
      name: spark-webui
  selector:
    app: spark-master

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  labels:
    app.kubernetes.io/name: bigdata
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      enableServiceLinks: false
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
      {{- with .Values.management.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: spark-master
          image: {{ .Values.spark.master.image }}
          command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
          args: ["--port", "7077", "--webui-port", "8080"]
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Advertise Pod IP so workers/drivers can connect cross-node
            - name: SPARK_LOCAL_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 7077
              name: spark-rpc
            - containerPort: 8080
              name: spark-webui
          resources:
            requests:
              memory: {{ .Values.spark.master.resources.requests.memory | quote }}
              cpu: {{ .Values.spark.master.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.spark.master.resources.limits.memory | quote }}
              cpu: {{ .Values.spark.master.resources.limits.cpu | quote }}
          volumeMounts:
            - name: hadoop-config
              mountPath: /opt/hadoop/conf/core-site.xml
              subPath: core-site.xml
            - name: hadoop-config
              mountPath: /opt/hadoop/conf/hdfs-site.xml
              subPath: hdfs-site.xml
            - name: spark-config
              mountPath: /opt/spark/conf/spark-env.sh
              subPath: spark-env.sh
            - name: spark-config
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf
      volumes:
        - name: hadoop-config
          configMap:
            name: hadoop-config
        - name: spark-config
          configMap:
            name: spark-config
