{{- /*
  cloudflared.yaml — Cloudflare Tunnel Deployment
  Zero-downtime: 2 replicas, prefer master nodes, fallback to workers
  Anti-affinity: 2 pod luôn trên 2 node khác nhau
  Routing cấu hình trên Cloudflare Dashboard (Public Hostnames)
*/ -}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  labels:
    app: cloudflared
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # Tolerate master taint → cho phép chạy trên control-plane nodes
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        # PREFER master nodes (weight 100), nhưng fallback to workers nếu masters offline
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
        # SPREAD: 2 pod trên 2 node khác nhau → zero-downtime khi 1 node offline
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - cloudflared
              topologyKey: kubernetes.io/hostname
      containers:
        - name: cloudflared
          image: {{ .Values.cloudflared.image }}
          imagePullPolicy: {{ .Values.cloudflared.imagePullPolicy }}
          args:
            - --metrics
            - 0.0.0.0:2000
            - tunnel
            - --no-autoupdate
            - --protocol
            - http2
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: infra-secrets
                  key: cloudflare-token
          ports:
            - containerPort: 2000   # cloudflared metrics/health server
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 50m
