{{- /*
  loki.yaml — Loki: ConfigMap + PVC + Service + StatefulSet
  Monolithic (single-binary) mode, pinned to master node.
  NodePort 30100 cho truy cập trực tiếp.
*/ -}}

# ==========================================================================
# CONFIGMAP: loki-config
# ==========================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  labels:
    app: loki
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      filesystem:
        directory: /loki/chunks
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache

    limits_config:
      retention_period: {{ .Values.loki.retention }}
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      max_query_series: 5000
      max_query_parallelism: 2
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 6

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      delete_request_store: filesystem

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    analytics:
      reporting_enabled: false

---
# ==========================================================================
# PVC: loki-data
# ==========================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  labels:
    app: loki
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.loki.storage }}

---
# ==========================================================================
# SERVICE: loki (ClusterIP + NodePort 30100)
# ==========================================================================
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels:
    app: loki
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: NodePort
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
      nodePort: 30100
    # gRPC (9096) intentionally not exposed: only for internal Loki cluster
    # communication, not used in monolithic single-replica mode.

---
# ==========================================================================
# STATEFULSET: loki → master node (monolithic single replica)
# ==========================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  labels:
    app: loki
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podManagementPolicy: Parallel
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.loki.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsGroup: 10001
        runAsNonRoot: true
      containers:
        - name: loki
          image: {{ .Values.loki.image }}
          args:
            - -config.file=/etc/loki/loki.yaml
            - -target=all
          ports:
            - containerPort: 3100
              name: http
            - containerPort: 9096
              name: grpc
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: {{ .Values.loki.resources.requests.memory }}
              cpu: {{ .Values.loki.resources.requests.cpu }}
            limits:
              memory: {{ .Values.loki.resources.limits.memory }}
              cpu: {{ .Values.loki.resources.limits.cpu }}
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki
            - name: loki-data
              mountPath: /loki
      volumes:
        - name: loki-config
          configMap:
            name: loki-config
        - name: loki-data
          persistentVolumeClaim:
            claimName: loki-data

