{{- /*
  api.yaml — RedShark Spring Boot API
  Deployment + Service (ClusterIP)
  Secret redshark-secrets phải tồn tại trước khi deploy
*/ -}}

# ================================================================
# Deployment
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redshark-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: redshark-api
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: redshark-api
  template:
    metadata:
      labels:
        app: redshark-api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: redshark-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redshark-secrets
                  key: db-password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
# ================================================================
# Service (ClusterIP — Cloudflare Tunnel trỏ vào đây)
# ================================================================
apiVersion: v1
kind: Service
metadata:
  name: redshark-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: redshark-api
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app: redshark-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
