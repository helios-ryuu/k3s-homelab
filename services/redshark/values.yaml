# =================================================================
# RedShark API — Helm values
# Deploy: helm upgrade --install redshark ./services/redshark -n redshark
# =================================================================

image:
  repository: ghcr.io/helios-ryuu/redshark-api
  tag: "latest"
  pullPolicy: Always

replicas: 0  # placeholder — set to 1 when ready to deploy

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Secret redshark-secrets được quản lý bởi Sealed Secrets (secrets/redshark-secrets-redshark.yaml)
# Xem SETUP.md bước 3.6 để generate, bước 3.8 để cập nhật
