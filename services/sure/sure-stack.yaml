# ================= CẤU TRÚC LƯU TRỮ (PVC) =================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sure-postgres-pvc
  namespace: sure
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sure-redis-pvc
  namespace: sure
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# ================= DATABASE & CACHE =================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sure-postgres
  namespace: sure
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO PVC — only one pod at a time
  selector:
    matchLabels:
      app: sure-postgres
  template:
    metadata:
      labels:
        app: sure-postgres
    spec:
      nodeSelector:
        app-host: sure
      containers:
        - name: postgres
          image: postgres:18-alpine
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              value: "sure_user"
            - name: POSTGRES_DB
              value: "sure_development"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infra-secrets
                  key: sure-postgres-password
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "sure_user", "-d", "sure_development"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: sure-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sure-postgres
  namespace: sure
spec:
  selector:
    app: sure-postgres
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sure-redis
  namespace: sure
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO PVC — only one pod at a time
  selector:
    matchLabels:
      app: sure-redis
  template:
    metadata:
      labels:
        app: sure-redis
    spec:
      nodeSelector:
        app-host: sure
      containers:
        - name: redis
          image: redis:8-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: sure-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sure-redis
  namespace: sure
spec:
  selector:
    app: sure-redis
  ports:
    - port: 6379
---
# ================= SURE APP (WEB & WORKER) =================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sure-web
  namespace: sure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sure-web
  template:
    metadata:
      labels:
        app: sure-web
    spec:
      nodeSelector:
        app-host: sure
      containers:
        - name: sure-web
          image: ghcr.io/we-promise/sure:stable
          env:
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: infra-secrets
                  key: sure-secret-key-base
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infra-secrets
                  key: sure-postgres-password
            - name: DATABASE_URL
              value: "postgres://sure_user:$(POSTGRES_PASSWORD)@sure-postgres:5432/sure_development"
            - name: REDIS_URL
              value: "redis://sure-redis:6379/1"
            - name: RAILS_ASSUME_SSL
              value: "true"
            - name: SELF_HOSTED
              value: "true"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sure-worker
  namespace: sure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sure-worker
  template:
    metadata:
      labels:
        app: sure-worker
    spec:
      nodeSelector:
        app-host: sure
      containers:
        - name: sure-worker
          image: ghcr.io/we-promise/sure:stable
          command: ["bundle", "exec", "sidekiq"]
          env:
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: infra-secrets
                  key: sure-secret-key-base
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infra-secrets
                  key: sure-postgres-password
            - name: DATABASE_URL
              value: "postgres://sure_user:$(POSTGRES_PASSWORD)@sure-postgres:5432/sure_development"
            - name: REDIS_URL
              value: "redis://sure-redis:6379/1"
            - name: SELF_HOSTED
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# ================= EXPOSE (NODEPORT) =================
apiVersion: v1
kind: Service
metadata:
  name: sure-web-svc
  namespace: sure
spec:
  type: NodePort
  selector:
    app: sure-web
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30333