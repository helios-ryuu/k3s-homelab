{{- /*
  oracle-db.yaml — Headless Service + NodePort Service + StatefulSet
  replicas={{ .Values.replicas }}

  - Headless Service: DNS nội bộ cho từng instance
    oracle-db-0.oracle-svc.oracle.svc.cluster.local (Node 1)
    oracle-db-1.oracle-svc.oracle.svc.cluster.local (Node 2)
  - NodePort 31521: kết nối từ DataGrip/SQL Developer qua Tailscale IP
  - Anti-affinity: đảm bảo mỗi pod trên 1 node riêng biệt

  FAULT TOLERANCE:
  - Node offline → pod Pending, pod còn lại vẫn chạy
  - PVC (local-path) giữ data khi restart
  - tolerations: cho phép chạy trên master node (control-plane)
*/ -}}

# ==========================================================================
# HEADLESS SERVICE: oracle-svc (DNS nội bộ cho StatefulSet)
# ==========================================================================
apiVersion: v1
kind: Service
metadata:
  name: oracle-svc
  labels:
    app: oracle
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  clusterIP: None
  selector:
    app: oracle
  ports:
    - name: db-port
      port: 1521

---
# ==========================================================================
# NODEPORT SERVICE: Kết nối từ bên ngoài (DataGrip, SQL Developer)
# Truy cập qua <Tailscale-IP>:{{ .Values.nodePort }}
#   Node 1:   <node-1-ip>:{{ .Values.nodePort }}
#   Node 2:   <node-2-ip>:{{ .Values.nodePort }}
# ==========================================================================
apiVersion: v1
kind: Service
metadata:
  name: oracle-nodeport
  labels:
    app: oracle
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: NodePort
  selector:
    app: oracle
  ports:
    - name: db-external
      port: 1521
      targetPort: 1521
      nodePort: {{ .Values.nodePort }}

---
# ==========================================================================
# STATEFULSET: oracle-db
# replicas: {{ .Values.replicas }}
# oracle-db-0 = Node 1 | oracle-db-1 = Node 2
# PDBs: LAB11PDB, LAB12PDB (mỗi instance)
# ==========================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: oracle-db
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podManagementPolicy: Parallel
  serviceName: oracle-svc
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: oracle
  template:
    metadata:
      labels:
        app: oracle
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # Tolerate master node taint (control-plane)
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}
      affinity:
        # Đảm bảo mỗi node tối đa 1 Oracle pod
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - oracle
            topologyKey: kubernetes.io/hostname

      containers:
      - name: oracle-engine
        image: {{ .Values.oracle.image }}
        imagePullPolicy: Never
        securityContext:
          privileged: true
        env:
        - name: ORACLE_SID
          value: {{ .Values.oracle.sid | quote }}
        - name: ORACLE_PDB
          value: {{ .Values.oracle.pdbName | default "ORCLPDB" | quote }}
        - name: ORACLE_PWD
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: oracle-password
        resources:
          requests:
            memory: {{ .Values.oracle.resources.requests.memory }}
            cpu: {{ .Values.oracle.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.oracle.resources.limits.memory }}
            cpu: {{ .Values.oracle.resources.limits.cpu | quote }}
        ports:
        - containerPort: 1521
          hostPort: 1521
        volumeMounts:
        - name: oracle-data
          mountPath: /opt/oracle/oradata
        # tnsnames.ora: cấu hình PDB entries cho LAB11PDB/LAB12PDB
        - name: tns-data-volume
          mountPath: /tmp/custom_tns/tnsnames.ora
          subPath: tnsnames.ora
        # Startup script: inject tnsnames.ora vào Oracle home
        - name: tns-script-volume
          mountPath: /opt/oracle/scripts/startup/01_update_tns.sh
          subPath: 01_update_tns.sh
        # Script khoi tao PDBs: tu dong tao 4 PDBs ban dau
        - name: pdb-script-volume
          mountPath: /opt/oracle/scripts/startup/02_init_pdbs.sh
          subPath: 02_init_pdbs.sh

      volumes:
      - name: tns-data-volume
        configMap:
          name: oracle-network-config
      - name: tns-script-volume
        configMap:
          name: oracle-network-config
          defaultMode: 0755
      - name: pdb-script-volume
        configMap:
          name: oracle-network-config
          defaultMode: 0755

  volumeClaimTemplates:
  - metadata:
      name: oracle-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: {{ .Values.oracle.storage }}
