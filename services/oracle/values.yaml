# =================================================================
# Oracle Database 19c — trên K3s
# =================================================================
# Deploy:  ./k3s.sh deploy oracle
# Delete:  ./k3s.sh delete oracle
# Check:   ./services/oracle.sh check
# =================================================================
#
# ┌──────────────────────────────────────────────────────────────┐
# │                   PHÂN BỔ INSTANCE                          │
# ├──────────────┬──────────────┬────────────────────────────────┤
# │ Pod          │ Node         │ PDBs                           │
# ├──────────────┼──────────────┼────────────────────────────────┤
# │ oracle-db-0  │ node-1       │ LAB11PDB, LAB12PDB             │
# ├──────────────┼──────────────┼────────────────────────────────┤
# │ oracle-db-1  │ node-2       │ LAB11PDB, LAB12PDB             │
# └──────────────┴──────────────┴────────────────────────────────┘
#
# Scheduling: Pin vào database nodes (1 pod mỗi node)
# - Nếu 1 node offline → 1 pod Pending, pod còn lại vẫn chạy
# - Nếu cả 2 offline → cả 2 Pending
# - PVC giữ nguyên data khi pod restart / node reboot
#
# Kết nối từ bên ngoài (DataGrip / SQL Developer):
#   Host: <Tailscale IP>  Port: 31521 (NodePort)
#   Node 1:    <node-1-ip>:31521
#   Node 2:    <node-2-ip>:31521
#   SID: ORCLCDB  |  User: sys as sysdba  |  Pass: Oracle@2026
# =================================================================

# Số lượng instance Oracle (2 = 2 instances độc lập)
replicas: 0

# Label để chọn node deploy Oracle
oracle:
  image: oracle-database-19c:latest
  sid: ORCLCDB
  pdbName: ORCLPDB
  # password: managed by Sealed Secrets (secrets/infra-secrets-oracle.yaml)
  storage: 10Gi

  resources:
    requests:
      memory: 4Gi
      cpu: "4000m"
    limits:
      memory: 8Gi
      cpu: "8000m"

# NodePort cho kết nối từ bên ngoài (DataGrip, SQL Developer)
# Truy cập: <Tailscale-IP>:31521
nodePort: 31521
nodeSelector:
  node-role.kubernetes.io/database-oracle: "true"
