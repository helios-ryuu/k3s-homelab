{{- /*
  mssql-config.yaml — ConfigMap chứa script SQL khởi tạo database

  LAB 4 MAPPING:
  - setup.sql: tạo database MSSQLDB nếu chưa tồn tại
  - Database này dùng cho tất cả bài tập Lab 4:
    • Tables: KHACHHANG, CHINHANH, GIAODICH
    • Users: QLCN1/QLCN2/QLCN3, QLHS, GUEST
    • Trigger: CapNhatGD
    • Procedures: GuiTien, RutTien
  - Script chạy bởi init sidecar sau khi SQL Server khởi động
  - Idempotent: IF NOT EXISTS → an toàn khi pod restart
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: mssql-config
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  # setup.sql: chạy bởi mssql-init sidecar khi pod khởi động
  # Tạo database cho Lab 4 exercises
  setup.sql: |
    -- Tạo database nếu chưa tồn tại (tránh lỗi khi Pod restart)
    IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = '{{ .Values.mssql.database }}')
    BEGIN
        CREATE DATABASE {{ .Values.mssql.database }};
    END
    GO
